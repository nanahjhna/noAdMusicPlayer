[build]
command = """
    rm -rf flutter && \
    git clone https://github.com/flutter/flutter.git -b stable && \
    export PATH="$PATH:`pwd`/flutter/bin" && \
    flutter config --enable-web && \
    flutter build web --release
  """
publish = "build/web"

[build.environment]
PYTHON_VERSION = "3.8"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200